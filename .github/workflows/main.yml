name: Build and Run Bot

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          g++ \
          libcurl4-openssl-dev \
          libjsoncpp-dev \
          cmake

    - name: Build bot
      run: |
        g++ -std=c++17 -O2 -pthread \
          -o bot bot.cpp \
          -lcurl -ljsoncpp \
          -Wall -Wextra

    - name: Run bot
      run: |
        ./bot
      timeout-minutes: 5
    
